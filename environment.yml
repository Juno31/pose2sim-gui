name: markerless
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10

  # Scientific computing
  - numpy>=1.23
  - scipy>=1.10
  - toml>=0.10

  # pip-only packages
  - pip
  - pip:
    - pose2sim>=0.10
    - pywebview>=5.0
    - rtmlib
    - onnxruntime
    - opencv-contrib-python
    # Uncomment below for NVIDIA GPU support (replaces onnxruntime):
    # - onnxruntime-gpu
